name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: false

      - name: go vet (linux)
        run: go vet ./...

      - name: go vet (windows target)
        run: GOOS=windows GOARCH=amd64 go vet ./...

      - name: cross-build windows amd64
        run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o /tmp/out.exe .
